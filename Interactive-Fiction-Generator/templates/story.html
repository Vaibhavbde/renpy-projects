{% extends "layout.html" %}
{% block content %}
  <h4>Playing: {{story_name}}</h4>
  <div class="mt-4 p-3 bg-light rounded shadow-sm">
    <p style="white-space: pre-wrap;">{{ node.text }}</p>
    {% if not is_end %}
    <form method="POST">
      <div class="mt-3">
        {% for choice in choices %}
          <button class="btn btn-outline-primary d-block mb-2" 
                  type="submit" 
                  name="choice" 
                  value="{{ loop.index0 }}">{{ choice.text }}</button>
        {% endfor %}
      </div>
    </form>
    {% else %}
      <div class="alert alert-info mt-3">The End. <a href="{{ url_for('play', story_name=story_name) }}">Restart?</a></div>
    {% endif %}
  </div>
  <div class="mt-3">
    <a href="{{ url_for('index') }}">Back to Home</a>
  </div>
{% endblock %}
