<!doctype html>
<title>{{ title if title else "Interactive Fiction Generator" }}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<div class="container mt-4">
  <h2 class="mb-4"><a href="{{ url_for('index') }}" style="text-decoration:none;color:inherit;">Interactive Fiction Generator</a></h2>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div>
      {% for category, message in messages %}
        <div class="alert alert-{{'warning' if category == 'error' else category}}">{{ message }}</div>
      {% endfor %}
      </div>
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
